<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rini - Women's Health</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
    --pink: #F06292; 
    --glass: rgba(255, 255, 255, 0.7); 
    --glass-border: rgba(255, 255, 255, 0.3);
}
body { 
    background: linear-gradient(135deg, #FFF5F7 0%, #FCE4EC 100%);
    background-attachment: fixed;
    font-family: 'Segoe UI', sans-serif;
    margin: 0; padding: 15px;
    display: flex; justify-content: center;
}
.app { 
    width: 100%; max-width: 450px; 
    background: var(--glass);
    backdrop-filter: blur(10px); /* The Frosted Effect */
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 30px; 
    padding: 20px;
    box-shadow: 0 8px 32px rgba(240, 98, 146, 0.15);
}
.card { 
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: 20px; 
    padding: 15px; 
    margin-top: 15px; 
}
/* Calendar Styling */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    text-align: center;
    margin-top: 10px;
}
.day { padding: 8px; border-radius: 8px; font-size: 0.8em; background: rgba(255,255,255,0.5); }
.period { background: #FF80AB !important; color: white; }
.fertile { background: #B2FF59 !important; }
.peak { background: #76FF03 !important; font-weight: bold; }
.unsafe { border: 2px solid #F06292; }
    </style>
</head>
<body>

<div class="app">
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">हिन्दी</button>
    <h1 id="title">RINI</h1>

    <div style="text-align:right;">
        <button onclick="toggleSettings()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">⚙️</button>
    </div>

    <div id="settingsPanel" style="display:none;">
        <div class="card">
            <h3 id="lbl-profile">Profile Settings</h3>
            <input type="text" id="userName" placeholder="Name">
            <input type="date" id="dob" onchange="runAI()">
            <input type="number" id="height" placeholder="Height (cm)" oninput="runAI()">
            <input type="number" id="weight" placeholder="Weight (kg)" oninput="runAI()">
            
            <label>Select Goals:</label>
            <div id="goalList" style="font-size: 0.9em;">
                </div>
        </div>

        <div id="cycleSettings" class="card" style="display:none;">
            <h3 id="lbl-cycle-set">Cycle Settings</h3>
            <label>Last Period Start Date</label>
            <input type="date" id="periodStart" onchange="renderCalendar()">
            <label>Period Length (Days)</label>
            <input type="number" id="pLength" value="5" oninput="renderCalendar()">
            <label>Cycle Length (Days)</label>
            <input type="number" id="cLength" value="28" oninput="renderCalendar()">
        </div>
        
        <button id="saveBtn" onclick="saveProfile()">Save Profile</button>
    </div>

    <div id="dashboard">
        <div class="card">
            <h3 id="cal-title">Cycle Calendar</h3>
            <div id="calendarMonth" style="font-weight:bold; color:var(--pink); margin-bottom:10px;"></div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
            <div style="margin-top:15px; font-size:0.7em; display:flex; gap:10px; flex-wrap:wrap;">
                <span><span style="color:#FF80AB;">●</span> Period</span>
                <span><span style="color:#76FF03;">●</span> Peak Fertile</span>
                <span><span style="border:1px solid #F06292; padding:0 3px;">□</span> Unsafe</span>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLang = 'en';
    const allGoals = {
    "Hormonal": ["Cycle Syncing", "Menopause", "Fertility", "PCOS"],
    "Weight": ["Fat Loss", "Muscle Gain", "Body Recomp"],
    "Performance": ["Strength", "Athletic Peak", "Power"]
};

// Toggle Settings View
function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// Generate Checklist for Goals
function initGoals() {
    const container = document.getElementById('goalList');
    for (let main in allGoals) {
        container.innerHTML += `<b>${main}</b><br>`;
        allGoals[main].forEach(sub => {
            container.innerHTML += `
                <label style="font-weight:normal;">
                    <input type="checkbox" class="goal-check" value="${sub}" onchange="checkCycleVis()"> ${sub}
                </label><br>`;
        });
    }
}

// Show/Hide Cycle Settings
function checkCycleVis() {
    const checks = document.querySelectorAll('.goal-check');
    let show = false;
    checks.forEach(c => { if(c.value === "Cycle Syncing" && c.checked) show = true; });
    document.getElementById('cycleSettings').style.display = show ? 'block' : 'none';
}

function renderCalendar() {
    const start = new Date(document.getElementById('periodStart').value);
    const C = parseInt(document.getElementById('cLength').value);
    const P = parseInt(document.getElementById('pLength').value);
    const grid = document.getElementById('calendarGrid');
    
    if(!start.getTime()) return;

    grid.innerHTML = "";
    const month = start.getMonth();
    const year = start.getFullYear();
    document.getElementById('calendarMonth').innerText = start.toLocaleString('default', { month: 'long', year: 'numeric' });

    // Core Milestone: Ovulation (O = S + C - 14)
    const O = new Date(start); O.setDate(start.getDate() + C - 14);
    
    // Logic Loop for 31 days
    for(let i=0; i<31; i++) {
        let current = new Date(start);
        current.setDate(start.getDate() - 5 + i); // Show window around period
        
        let dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.innerText = current.getDate();

        // Formula Checks
        const diff = (current - start) / (1000*60*60*24);
        
        if(diff >= 0 && diff < P) dayDiv.classList.add('period');
        if(diff >= (C - 19) && diff <= (C - 13)) dayDiv.classList.add('unsafe');
        if(diff >= (C - 16) && diff <= (C - 14)) dayDiv.classList.add('peak');

        grid.appendChild(dayDiv);
    }
}

// Call init on load
window.onload = function() {
    initGoals();
    // (Add your existing localStorage load logic here)
};
</script>

</body>
</html>
